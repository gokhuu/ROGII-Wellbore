name: rogii
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Core
  - numpy>=1.26,<2.0
  - pandas>=2.2
  - pyarrow>=15.0
  - scipy>=1.12
  - scikit-learn>=1.4
  - lightgbm>=4.3
  - pytorch>=2.2
  - mlflow>=2.12
  - typer>=0.12
  - loguru>=0.7
  - duckdb>=0.10
  - python-dotenv>=1.0
  # Dev
  - ruff>=0.4
  - mypy>=1.10
  - pytest>=8.2
  - pytest-cov>=5.0
  - pre-commit>=3.7
  - nbstripout>=0.7
  - jupyterlab>=4.2
  - ipykernel>=6.29
  # Viz
  - matplotlib>=3.8
  - seaborn>=0.13
  - plotly>=5.20
  # Pip-only
  - pip:
      - fastapi>=0.110
      - uvicorn[standard]>=0.29
      - pydantic>=2.7
      - -e .
